name:TextBox, TextButton, Label (WiFi)
description:WiFi connection screen: two TextBox widgets (SSID, password), a "Connect" TextButton and a Label showing "Connected" or "Disconnected". Connect callback sets a flag so the loop runs WiFi.begin(); loop updates the Label from WiFi.status(). ST7796, FT6336U, ESP32-S3.
exampleFileName:example17.ewx
