name:GaugeSuper, Label (WiFi RSSI)
description:Displays WiFi signal strength (RSSI) with a GaugeSuper (semicircular gauge with needle and coloured ranges) and a Label. Loop reads WiFi.RSSI() and updates both. Configure SSID and PASSWORD before use. ST7796, FT6336U, ESP32-S3.
exampleFileName:example12.ewx
